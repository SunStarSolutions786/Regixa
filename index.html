  t.className='toast';t.innerHTML=`<div class="tdot" style="background:${c}"></div><span>${msg}</span>`;
  w.appendChild(t);setTimeout(()=>t.remove(),3500);
}
function showErr(m){const e=g('lerr');e.textContent=m;e.style.display='block';}
function ftLabel(t){return{text:'Text',phone:'Phone',date:'Date',time:'Time',timeslot:'Time Slot',number:'Number',textarea:'Textarea',status:'Status',dropdown:'Dropdown','master-lookup':'Master lookup','auto-fill':'Auto-fill','created-on':'Auto — Booked On'}[t]||t;}
function fmtDD(val){if(!val||!/^\d{4}-\d{2}-\d{2}$/.test(val))return val||'—';const[y,m,d]=val.split('-');const mon=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1];return`${parseInt(d)} ${mon} '${y.slice(2)}`;}
function nowStamp(){const n=new Date();return`${String(n.getDate()).padStart(2,'0')} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][n.getMonth()]} ${n.getFullYear()}, ${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;}
function fmtDV(d){return d.toISOString().slice(0,10);}
function setSaving(id,on){const b=g(id);if(!b)return;b.disabled=on;if(on){b._t=b.innerHTML;b.innerHTML='<span class="spin"></span>';}else{b.innerHTML=b._t||'Save';}}

// AUTH
window.doLogin=async function(){
  const email=v('l-email'),pw=v('l-pw');
  if(!email||!pw){showErr('Enter email and password');return;}
  const btn=g('login-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span> Signing in…';
  g('lerr').style.display='none';
  try{
    const cr=await signInWithEmailAndPassword(auth,email,pw);
    UID=cr.user.uid;
    const us=await getDoc(docRef(db,'users',UID));
    if(!us.exists())throw new Error('User profile not found. Contact admin.');
    CU=us.data();
    if(CU.role!=='super'&&CU.companyId){
      const cs=await getDoc(docRef(db,'companies',CU.companyId));
      if(cs.exists()&&cs.data().expiry){
        const exp=new Date(cs.data().expiry);exp.setHours(23,59,59);
        if(new Date()>exp){await signOut(auth);throw new Error('Subscription expired. Contact your administrator.');}
      }
    }
    await loadAll();initApp();
  }catch(e){showErr(e.message.replace('Firebase: ','').replace(/\(auth.*\)/,'').trim());}
  finally{btn.disabled=false;btn.innerHTML='Sign in';}
};

window.doLogout=async function(){
  await signOut(auth);CU=null;UID=null;_cos=[];_users=[];_regs={};_mls={};_bks={};window._RF={};window._LK={};
  g('app').classList.remove('show');g('login-screen').style.display='flex';g('l-pw').value='';g('tb-expiry').innerHTML='';
};

async function loadAll(){
  if(CU.role==='super'){
    _cos=(await getDocs(col(db,'companies'))).docs.map(d=>({id:d.id,...d.data()}));
    _users=(await getDocs(col(db,'users'))).docs.map(d=>({uid:d.id,...d.data()}));
    for(const co of _cos)await loadCo(co.id);
  }else{
    const cs=await getDoc(docRef(db,'companies',CU.companyId));
    _cos=cs.exists()?[{id:cs.id,...cs.data()}]:[];
    _users=(await getDocs(col(db,'users'))).docs.map(d=>({uid:d.id,...d.data()})).filter(u=>u.companyId===CU.companyId);
    await loadCo(CU.companyId);
  }
}

async function loadCo(cid){
  _regs[cid]=(await getDocs(col(db,'companies',cid,'registers'))).docs.map(d=>({id:d.id,...d.data()}));
  const mSnap=await getDocs(col(db,'companies',cid,'masterLists'));
  _mls[cid]=await Promise.all(mSnap.docs.map(async d=>{
    const ml={id:d.id,...d.data()};
    ml.rows=(await getDocs(col(db,'companies',cid,'masterLists',d.id,'rows'))).docs.map(r=>({id:r.id,...r.data()}));
    return ml;
  }));
  _bks[cid]={};
  for(const r of _regs[cid]){
    _bks[cid][r.id]=(await getDocsOrdered(db.collection('companies').doc(cid).collection('registers').doc(r.id).collection('bookings'),'createdAt','desc')).docs.map(d=>({id:d.id,...d.data()}));
  }
}

function initApp(){
  g('login-screen').style.display='none';g('app').classList.add('show');
  const co=_cos.find(c=>c.id===CU.companyId)||null;
  g('tb-co').textContent=co?co.name:'Platform Admin';
  g('tb-role').textContent={super:'Super Admin',company:'Company Admin',agent:'Agent'}[CU.role]||CU.role;
  g('tb-av').textContent=CU.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  g('tb-av').style.background=co?.color||'var(--p)';
  if(co?.expiry&&CU.role!=='super'){
    const dL=Math.ceil((new Date(co.expiry)-new Date())/86400000);
    g('tb-expiry').innerHTML=dL<=7&&dL>0?`<span style="background:#FEF3C7;border:1px solid #FCD34D;color:#92400E;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px">&#9888; ${dL}d left</span>`:`<span style="background:#DCFCE7;border:1px solid #86EFAC;color:#166534;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px">&#10003; ${new Date(co.expiry).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>`;

}

function pReg(regId){
  const cid=CU.role==='super'?null:CU.companyId;

  const reg=(_regs[cid]||[]).find(r=>r.id===regId);
  if(!reg)return'<div class="empty"><p>Register not found.</p></div>';
  const allRows=(_bks[cid]||{})[regId]||[];
  const F=window._RF[regId];
  const cfs=reg.filters||[];
  const isAgent=CU.role==='agent',isAdmin=CU.role==='company';
  if(!F._init){cfs.forEach(fc=>{const fld=(reg.fields||[]).find(f=>f.n===fc.fieldN);if(!fld)return;if(fld.t==='status'&&fc.defaultVal)F.statusVals[fc.fieldN]=[fc.defaultVal];if(fld.t==='date'&&fc.defaultVal)F.dateVals[fc.fieldN]=fc.defaultVal;});F._init=true;}

  const aDF=Object.values(F.dateVals).filter(Boolean).length;
  const tot=aSF+aDF+(F.search?1:0);

  const pColors={Active:'on-green',Done:'on-teal',Pending:'on-amber',Cancelled:'on-red'};
  let fRows='';
  cfs.forEach(fc=>{
    const fld=(reg.fields||[]).find(f=>f.n===fc.fieldN);if(!fld)return;

        <span class="fpill ${cur==='today'?'on':''}" onclick="setDF('${regId}','${fc.fieldN}','today')">Today</span>
        <span class="fpill ${cur==='tomorrow'?'on':''}" onclick="setDF('${regId}','${fc.fieldN}','tomorrow')">Tomorrow</span>
        <span class="fpill ${cur==='week'?'on':''}" onclick="setDF('${regId}','${fc.fieldN}','week')">This week</span>

      </div></div>`;
    }else{
      const active=F.statusVals[fc.fieldN]||[];

      </div></div>`;

    `<div style="overflow-x:auto"><table style="white-space:nowrap"><thead><tr>${(reg.fields||[]).map(f=>`<th>${f.n}</th>`).join('')}<th>Actions</th></tr></thead><tbody>

        return`<td><span class="tag ${sColors[val]||'ta'}">${val||'—'}</span></td>`;
      }
      if((f.t==='dropdown'||f.t==='timeslot')&&f.quickEdit&&(isAgent||isAdmin)){
        const opts=f.options||[];
        return`<td><select onchange="quickSave('${regId}',${ri},'${f.n.replace(/'/g,"\\'")}',this.value)" style="padding:3px 7px;border:1px solid var(--g200);border-radius:5px;font-size:12px;color:var(--g700);background:white;font-family:inherit;cursor:pointer;outline:none">${opts.map(o=>`<option ${val===o?'selected':''}>${o}</option>`).join('')}</select></td>`;
      }
      if(f.quickEdit){const fn=f.n.replace(/\\'/g,"\\\'");return`<td><input value="${val.replace(/"/g,'&quot;')}" onblur="this.style.borderColor='transparent';this.style.background='transparent';quickSave('${regId}',${ri},'${fn}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" onfocus="this.style.borderColor='var(--p)';this.style.background='white'" style="min-width:80px;width:100%;padding:3px 6px;border:1px solid transparent;border-radius:5px;font-size:13px;font-family:inherit;outline:none;background:transparent"></td>`;}
      return`<td>${val||'—'}</td>`;
    }).join('')}<td>${isAdmin?`<button class="btn-r" onclick="openEditBooking('${regId}',${ri})">Edit</button> <button class="btn-del" onclick="delBooking('${regId}',${ri})">Del</button>`:''}</td></tr>`).join('')}
    </tbody></table></div>`;
  const resLine=tot>0?`<div style="padding:.35rem 1rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:8px;background:var(--g50)"><span style="font-size:11px;color:var(--g500)">Showing <b>${cnt}</b> of ${allRows.length}</span><button class="clr-btn" onclick="clrFilters('${regId}')">&#x2715; Clear all</button></div>`:'';
  return`<div class="ph"><div><div class="ph-t">${reg.icon||'&#128203;'} ${reg.name}</div><div class="ph-s">${cnt} of ${allRows.length} shown</div></div><button class="btn-p" onclick="openBM('${regId}')">+ New booking</button></div>
  <div class="tc">
    <div class="tbar">
      <div class="srch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Search…" value="${F.search||''}" oninput="regSearch(this,'${regId}')"></div>

    </div>

// ── FILTERS ──
function applyFilters(rows,reg,regId){
  const F=window._RF[regId];
  const td=fmtDV(new Date()),tm=fmtDV(new Date(Date.now()+86400000));
  const now=new Date(),dow=now.getDay(),mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const ms=fmtDV(mon),ss=fmtDV(sun);
  return rows.map((row,ri)=>({row,ri})).filter(({row})=>{
    if(F.search){const all=Object.values(row.vals||{}).join(' ').toLowerCase();if(!all.includes(F.search.toLowerCase()))return false;}
    for(const[fn,allowed]of Object.entries(F.statusVals)){if(!allowed?.length)continue;if(!allowed.includes(row.vals?.[fn]||''))return false;}
    for(const[fn,filter]of Object.entries(F.dateVals)){
      if(!filter)continue;const val=row.vals?.[fn]||'';
      if(filter==='today'&&val!==td)return false;if(filter==='tomorrow'&&val!==tm)return false;
      if(filter==='week'&&(val<ms||val>ss))return false;
      if(!['today','tomorrow','week'].includes(filter)&&val!==filter)return false;
    }
    return true;
  });
}

window.regSearch=function(inp,id){window._RF[id].search=inp.value;reReg(id);};
window.setSF=function(id,fn,val){const F=window._RF[id];if(!F.statusVals[fn])F.statusVals[fn]=[];if(val==='__all__'){F.statusVals[fn]=[];reReg(id);return;}const i=F.statusVals[fn].indexOf(val);if(i>-1)F.statusVals[fn].splice(i,1);else F.statusVals[fn].push(val);reReg(id);};
window.setDF=function(id,fn,val){window._RF[id].dateVals[fn]=val;reReg(id);};
window.clrFilters=function(id){const s=window._RF[id]?.showFilters;window._RF[id]={search:'',statusVals:{},dateVals:{},_init:false,showFilters:s};reReg(id);};
window.toggleFP=function(id){window._RF[id].showFilters=window._RF[id].showFilters===false;reReg(id);};

function doAutoFill(ti,regId,enc){

  (reg.fields||[]).forEach((f,i)=>{if(f.t==='auto-fill'&&f.src?.dependsOn===tf?.n){const el=g('bf-'+i);if(el)el.value=vals[f.src.fillCol]||'';}});
}

  try{
    if(ri===null||ri==='null'){const ref=await addDoc(col(db,'companies',CU.companyId,'masterLists',m.id,'rows'),{vals});if(!m.rows)m.rows=[];m.rows.push({id:ref.id,vals});}
    else{const row=m.rows[parseInt(ri)];await updateDoc(docRef(db,'companies',CU.companyId,'masterLists',m.id,'rows',row.id),{vals});row.vals=vals;}
    closeModal();toast(ri===null||ri==='null'?'Record added':'Updated','green');loadPage('ml-'+m.id);
  }catch(e){toast(e.message,'red');}finally{ss(false);}
};

window.delMLRow=async function(mi,ri,fromML){
  if(!confirm('Delete this record?'))return;
  const m=(_mls[CU.companyId]||[])[mi],row=(m.rows||[])[ri];
  try{await deleteDoc(docRef(db,'companies',CU.companyId,'masterLists',m.id,'rows',row.id));m.rows.splice(ri,1);toast('Deleted','amber');if(fromML)loadPage('ml-'+m.id);else loadPage('co-ml');}catch(e){toast(e.message,'red');}
};

window.addAgent=async function(){
  const name=v('m1'),email=v('m2'),pw=v('m3');
  if(!name||!email||!pw){toast('Fill all fields','red');return;}if(pw.length<6){toast('Password min 6 chars','red');return;}
  ss(true);
  try{const cr=await createUserWithEmailAndPassword(auth,email,pw);await setDoc(docRef(db,'users',cr.user.uid),{name,email,role:'agent',companyId:CU.companyId});_users.push({uid:cr.user.uid,name,email,role:'agent',companyId:CU.companyId});closeModal();toast('Agent added: '+email,'green');loadPage('co-agents');}catch(e){toast(e.message.replace('Firebase: ',''),'red');}finally{ss(false);}
};

// FIELD SRC UI
window.toggleFS=function(sel,ri){
  const type=sel.value,mls=_mls[CU.companyId]||[],wrap=g('field-src-opts');if(!wrap)return;
  window._dropOpts=window._dropOpts||[];window._slotOpts=window._slotOpts||[];
  if(type==='dropdown'){
    wrap.style.display='block';
    wrap.innerHTML=`<div class="sbox-t" style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:6px">Dropdown options</div><div id="drop-opt-list" style="margin-bottom:8px">${window._dropOpts.map((o,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="flex:1;font-size:13px;background:var(--g50);padding:4px 9px;border-radius:6px">${o}</span><button class="btn-del" style="padding:2px 7px" onclick="_dropOpts.splice(${i},1);toggleFS(document.getElementById('nft'),${ri})">&#x2715;</button></div>`).join('')}</div>
    <div style="display:flex;gap:6px"><input id="new-drop-opt" placeholder="Add option…" style="flex:1;padding:6px 10px;border:1px solid var(--g200);border-radius:7px;font-size:13px;outline:none;font-family:inherit" onkeydown="if(event.key==='Enter'){_dropOpts.push(this.value.trim());this.value='';toggleFS(document.getElementById('nft'),${ri})}"><button class="btn-p" style="padding:5px 12px" onclick="const nv=g('new-drop-opt').value.trim();if(nv){_dropOpts.push(nv);g('new-drop-opt').value='';toggleFS(document.getElementById('nft'),${ri})}">Add</button></div>`;
  }else if(type==='timeslot'){
    if(!window._slotOpts.length)window._slotOpts=['Morning (8AM–12PM)','Afternoon (12PM–4PM)','Evening (4PM–8PM)'];
    wrap.style.display='block';
    wrap.innerHTML=`<div class="sbox-t" style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:6px">Time slot options</div><div style="margin-bottom:8px">${window._slotOpts.map((o,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="flex:1;font-size:13px;background:var(--g50);padding:4px 9px;border-radius:6px">${o}</span><button class="btn-del" style="padding:2px 7px" onclick="_slotOpts.splice(${i},1);toggleFS(document.getElementById('nft'),${ri})">&#x2715;</button></div>`).join('')}</div>
    <div style="display:flex;gap:6px"><input id="new-slot-opt" placeholder="Add slot e.g. 9AM–11AM" style="flex:1;padding:6px 10px;border:1px solid var(--g200);border-radius:7px;font-size:13px;outline:none;font-family:inherit" onkeydown="if(event.key==='Enter'){_slotOpts.push(this.value.trim());this.value='';toggleFS(document.getElementById('nft'),${ri})}"><button class="btn-p" style="padding:5px 12px" onclick="const nv=g('new-slot-opt').value.trim();if(nv){_slotOpts.push(nv);g('new-slot-opt').value='';toggleFS(document.getElementById('nft'),${ri})}">Add</button></div>`;
  }else if(type==='master-lookup'){
    wrap.style.display='block';
    wrap.innerHTML=`<div class="fg2"><div class="fg" style="margin:0"><label>Source list</label><select id="src-list" onchange="updSrcCols(this,'${ri}','lookup')"><option value="">Select list</option>${mls.map(m=>`<option value="${m.id}">${m.icon||''} ${m.name}</option>`).join('')}</select></div><div class="fg" style="margin:0"><label>Display column</label><select id="src-col"><option value="">Select list first</option></select></div></div>`;
  }else if(type==='auto-fill'){
    const reg=_regs[CU.companyId][ri];
    wrap.style.display='block';
    wrap.innerHTML=`<div class="fg2"><div class="fg" style="margin:0"><label>Source list</label><select id="src-list" onchange="updSrcCols(this,'${ri}','autofill')"><option value="">Select list</option>${mls.map(m=>`<option value="${m.id}">${m.icon||''} ${m.name}</option>`).join('')}</select></div><div class="fg" style="margin:0"><label>Column to fill</label><select id="src-fill-col"><option value="">Select list first</option></select></div></div>
    <div class="fg" style="margin-top:8px"><label>Triggered when</label><select id="src-depends">${(reg.fields||[]).filter(f=>f.t==='master-lookup').map(f=>`<option value="${f.n}">${f.n}</option>`).join('')||'<option value="">No lookup fields yet</option>'}</select></div>`;
  }else{wrap.style.display='none';wrap.innerHTML='';}
};

window.updSrcCols=function(sel,ri,mode){const mlId=sel.value,ml=(_mls[CU.companyId]||[]).find(m=>m.id===mlId);if(!ml)return;const cols=(ml.columns||[]).map(c=>`<option value="${c.n}">${c.n}</option>`).join('');const el=g(mode==='lookup'?'src-col':'src-fill-col');if(el)el.innerHTML=cols;};

window.renderNewCols=function(){const w=g('col-list');if(!w)return;w.innerHTML=(window._newCols||[]).map((c,i)=>`<div class="fi" style="margin-bottom:5px"><span class="fi-name">${c}</span><button class="btn-del" onclick="_newCols.splice(${i},1);renderNewCols()">&#x2715;</button></div>`).join('')||'<div style="font-size:12px;color:var(--g400);margin-bottom:4px">No columns yet</div>';};

// IMPORT/EXPORT
window.dlTemplate=function(mi){
  const m=(_mls[CU.companyId]||[])[mi];
  if(typeof XLSX!=='undefined'){
    const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet([m.columns.map(c=>c.n),m.columns.map(c=>'Example '+c.n)]);
    ws['!cols']=m.columns.map(()=>({wch:20}));XLSX.utils.book_append_sheet(wb,ws,m.name.slice(0,31));XLSX.writeFile(wb,m.name.replace(/\s+/g,'_')+'_template.xlsx');toast('Template downloaded','green');
  }else{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([m.columns.map(c=>'"'+c.n+'"').join(',')+'
'+m.columns.map(c=>'"Example '+c.n+'"').join(',')],{type:'text/csv'}));a.download=m.name.replace(/\s+/g,'_')+'_template.csv';a.click();toast('CSV template downloaded','green');}
};

window.importFile=function(ev,mi){
  const file=ev.target.files[0];if(!file)return;
  const m=(_mls[CU.companyId]||[])[mi];const isX=file.name.toLowerCase().match(/\.(xlsx|xls)$/);
  const reader=new FileReader();
  function proc(rows){
    if(!rows||!rows.length){toast('File empty','red');return;}
    const headers=rows[0].map(h=>String(h||'').trim());
    const dataRows=rows.slice(1).filter(r=>r.some(v=>String(v||'').trim()));
    if(!dataRows.length){toast('No data rows','red');ev.target.value='';return;}
    const colMap=(m.columns||[]).map(c=>({col:c.n,fi:headers.findIndex(h=>h.toLowerCase()===c.n.toLowerCase())}));
    const unm=colMap.filter(x=>x.fi===-1).map(x=>x.col);
    const prev=dataRows.slice(0,5).map(row=>{const vv={};colMap.forEach(x=>{vv[x.col]=x.fi>-1?String(row[x.fi]||'').trim():'';});return vv;});
    window._pendingImport={mi,colMap,dataRows,mlId:m.id};
    g('m-title').textContent='Import preview — '+m.name;g('mbox').className='mbox wide';
    g('m-body').innerHTML=`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap"><span style="background:var(--greenl);color:var(--green);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px">${dataRows.length} rows found</span>${unm.length?`<span style="background:var(--amberl);color:var(--amber);font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px">&#9888; Not found: ${unm.join(', ')}</span>`:''}</div>
    <div style="overflow-x:auto;border:1px solid var(--g200);border-radius:8px;margin-bottom:12px"><table style="white-space:nowrap"><thead><tr>${(m.columns||[]).map(c=>`<th>${c.n}</th>`).join('')}</tr></thead><tbody>${prev.map(row=>`<tr>${(m.columns||[]).map(c=>`<td>${row[c.n]||'<span style="color:var(--g300)">—</span>'}</td>`).join('')}</tr>`).join('')}</tbody></table></div>
    <div style="background:var(--g50);border-radius:8px;padding:10px;font-size:13px;color:var(--g600)">&#9888; Will <b>add</b> ${dataRows.length} new records.</div>`;
    g('m-ft').innerHTML=`<button class="btn-o" onclick="closeModal()">Cancel</button><button class="btn-p" id="msb" onclick="confirmImport()">&#10003; Import ${dataRows.length} records</button>`;
    ev.target.value='';g('modal').classList.add('on');
  }
  if(isX&&typeof XLSX!=='undefined'){reader.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'array'});proc(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''}));}catch(err){toast('Excel error: '+err.message,'red');}};reader.readAsArrayBuffer(file);}
  else{reader.onload=e=>{try{proc(e.target.result.replace(/
/g,'
').replace(/
/g,'
').split('
').filter(l=>l.trim()).map(parseCsv));}catch(err){toast('CSV error: '+err.message,'red');}};reader.readAsText(file);}
};

window.confirmImport=async function(){
  const p=window._pendingImport;if(!p)return;
  const m=(_mls[CU.companyId]||[])[p.mi];ss(true);let added=0;
  try{for(const row of p.dataRows){const vals={};p.colMap.forEach(x=>{vals[x.col]=x.fi>-1?String(row[x.fi]||'').trim():'';});const ref=await addDoc(col(db,'companies',CU.companyId,'masterLists',m.id,'rows'),{vals});if(!m.rows)m.rows=[];m.rows.push({id:ref.id,vals});added++;}
  window._pendingImport=null;closeModal();toast(added+' records imported','green');loadPage('ml-'+m.id);}catch(e){toast(e.message,'red');}finally{ss(false);}
};

function parseCsv(line){const r=[];let cur='',inQ=false;for(const c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){r.push(cur.trim());cur='';}else cur+=c;}r.push(cur.trim());return r;}

onAuthStateChanged(auth,user=>{if(!user){g('login-screen').style.display='flex';g('app').classList.remove('show');}});
</script>
